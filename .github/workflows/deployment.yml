name: Deploy .NET 8 API to EC2

on:
  push:
    tags:
      - 'v*'  # Deploy only when a version tag is pushed (e.g., v1.0.0)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      # ✅ Set up .NET 8 SDK
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0'

      # ✅ Restore dependencies
      - name: Restore Dependencies
        run: dotnet restore

      # ✅ Build project
      - name: Build Project
        run: dotnet build --no-restore --configuration Release

      # ✅ Run Unit Tests
      - name: Run Unit Tests
        run: dotnet test --no-build --configuration Release --logger trx --results-directory TestResults

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Debug Version
        run: echo "Deploying version:$VERSION"

      - name: Build and push Docker image
        run: |
          docker build -t sithuramyo/student-management-app-backend:$VERSION -f github-action/Dockerfile .
          docker push sithuramyo/student-management-app-backend:$VERSION
          docker tag sithuramyo/student-management-app-backend:$VERSION sithuramyo/student-management-app-backend:latest
          docker push sithuramyo/student-management-app-backend:latest

      # ✅ Set up SSH key for secure login
      - name: Set Up SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > private_key.pem
          chmod 600 private_key.pem
          ls -lah  # Debug: Check if the key file exists
          cat private_key.pem | head -n 5  # Debug: Print first 5 lines

      # ✅ Deploy to EC2 using SSH
      - name: Deploy to EC2
        env:
          VERSION: ${{ github.ref_name }}  # Pass the version as an environment variable
        run: |
          ssh -o StrictHostKeyChecking=no -i private_key.pem ec2-user@${{ secrets.EC2_HOST }} << EOF
            echo "Extracting version from Docker Hub..."
            echo "Deploying version: $VERSION"

            echo "Creating deployment directory if not exists..."
            sudo mkdir -p /opt/student-management-app-backend
            sudo chmod 777 /opt/student-management-app-backend

            cd /opt/student-management-app-backend

            echo "Pulling the latest version of the API..."
            docker pull sithuramyo/student-management-app-backend:$VERSION

            echo "Stopping and removing old container (if running)..."
            docker stop student-management-app-backend || true
            docker rm student-management-app-backend || true

            echo "Removing old unused images..."
            docker system prune -f

            echo "Starting new API container in /opt/student-management-app-backend..."
            docker run -d --name student-management-app-backend -p 5000:5000 -v /opt/student-management-app-backend:/app sithuramyo/student-management-app-backend:$VERSION

            echo "Deployment completed successfully!"
          EOF
